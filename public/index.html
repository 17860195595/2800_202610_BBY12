<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Map — ShadeSafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="has-app-footer has-map-time-rail has-bottom-dock">
    <div id="app-header"></div>
    <main class="map-page">
      <h1 class="visually-hidden">Map</h1>
      <div id="map" class="map-page__canvas" aria-label="Map centered on Vancouver"></div>
    </main>
    <div class="app-bottom-dock">
      <section
        id="map-time-rail"
        class="map-time-rail"
        role="region"
        aria-label="Time of day"
      >
        <div class="map-time-rail__meta">
          <label class="map-time-rail__label" for="map-time-slider">Time of day</label>
          <output
            class="map-time-rail__value"
            id="map-time-rail-display"
            for="map-time-slider"
            aria-live="polite"
          >12:00</output>
        </div>
        <input
          type="range"
          class="form-range map-time-rail__range"
          id="map-time-slider"
          min="0"
          max="23"
          step="1"
          value="12"
          aria-valuemin="0"
          aria-valuemax="23"
          aria-valuenow="12"
          aria-valuetext="12:00"
        />
        <div class="map-time-rail__ticks" aria-hidden="true">
          <span>00:00</span>
          <span>06:00</span>
          <span>12:00</span>
          <span>18:00</span>
          <span>23:00</span>
        </div>
      </section>
      <div id="app-footer"></div>
    </div>

    <!-- Map report: Bootstrap modal + mapReport.css / mapReport.js -->
    <button
      type="button"
      class="map-report-fab"
      id="map-report-fab"
      aria-haspopup="dialog"
      aria-controls="map-report-modal"
    >
      Report
    </button>

    <div
      class="modal fade map-report-bs-modal"
      id="map-report-modal"
      tabindex="-1"
      aria-labelledby="map-report-title"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content map-report-modal-content">
          <div class="modal-header flex-column align-items-stretch pb-2 border-bottom-0">
            <div class="d-flex w-100 justify-content-between align-items-start gap-2">
              <h2 class="modal-title fs-5 mb-0 map-report-modal-title" id="map-report-title">
                Report this place
              </h2>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <p class="small text-muted mb-0 mt-2 pe-4">
              Tell us what it feels like on the ground. Data is not saved yet.
            </p>
          </div>
          <div class="modal-body pt-2">
            <div class="map-report-field mb-3">
              <p class="map-report-label">Location</p>
              <p class="map-report-location-hint mb-0" id="map-report-location-hint">
                This report will use your current position from the device. Location capture is not
                wired up yet — coordinates will be added later.
              </p>
            </div>
            <fieldset class="map-report-field map-report-field--fieldset mb-3" id="map-report-type-fieldset">
              <legend class="map-report-label">What did you notice?</legend>
              <label class="map-report-radio-row">
                <input class="form-check-input flex-shrink-0 mt-0" type="radio" name="map-report-type" value="too_hot" checked />
                <span>Too hot</span>
              </label>
              <label class="map-report-radio-row">
                <input class="form-check-input flex-shrink-0 mt-0" type="radio" name="map-report-type" value="great_shade" />
                <span>Great shade</span>
              </label>
              <label class="map-report-radio-row">
                <input class="form-check-input flex-shrink-0 mt-0" type="radio" name="map-report-type" value="needs_shade_structure" />
                <span>Needs shade structure</span>
              </label>
            </fieldset>
            <p
              class="map-report-status mb-0"
              id="map-report-status"
              role="status"
              aria-live="polite"
              hidden
            ></p>
          </div>
          <div class="modal-footer border-top-0 pt-0 gap-2">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="map-report-cancel">
              Cancel
            </button>
            <button type="button" class="btn btn-primary map-report-submit-btn" id="map-report-submit">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Map onboarding: Bootstrap modal (mapOnboarding.css / mapOnboarding.js) -->
    <div
      class="modal fade map-onboarding-bs-modal"
      id="map-onboarding-modal"
      tabindex="-1"
      aria-labelledby="map-onboarding-title"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content map-onboarding-modal-content">
          <div class="modal-header flex-column align-items-stretch border-bottom-0 pb-0 position-relative pe-5">
            <button
              type="button"
              class="btn-close position-absolute top-0 end-0 mt-2 me-2"
              data-bs-dismiss="modal"
              aria-label="Close tour"
            ></button>
            <p class="map-onboarding__eyebrow mb-2" id="map-onboarding-eyebrow"></p>
            <h2 class="modal-title fs-5 map-onboarding-modal-title mb-0" id="map-onboarding-title"></h2>
          </div>
          <div class="modal-body pt-2">
            <p class="map-onboarding__body mb-3 mb-md-4" id="map-onboarding-body"></p>
            <div class="map-onboarding__dots" id="map-onboarding-dots" aria-hidden="true"></div>
          </div>
          <div class="modal-footer flex-wrap border-top-0 pt-0 gap-2">
            <button type="button" class="btn btn-link map-onboarding__skip px-2" id="map-onboarding-skip">
              Skip tour
            </button>
            <div class="d-flex flex-wrap gap-2 ms-auto">
              <button type="button" class="btn btn-outline-secondary btn-sm" id="map-onboarding-prev">
                Back
              </button>
              <button type="button" class="btn btn-primary btn-sm map-onboarding-next-btn" id="map-onboarding-next">
                Next
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script>
      loadAppHeader({ showBack: false });
      loadAppFooter();
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <!-- Leaflet.heat: smooth canvas heatmap (L.heatLayer), spectral-style gradient -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="js/data/mockMapLocations.js"></script>
    <script src="js/map/mapUtils.js"></script>
    <script src="js/map/mapHeat.js"></script>
    <script src="js/map/mapSpotDetail.js"></script>
    <script src="js/map/mapReport.js"></script>
    <script src="js/map/mapMarkers.js"></script>
    <script src="js/map/mapTimeRail.js"></script>
    <script src="js/map/mapOnboarding.js"></script>
    <script src="js/pages/index.js"></script>
  </body>
</html>
