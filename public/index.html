<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Map — ShadeSafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="has-app-footer has-map-time-rail has-bottom-dock">
    <div id="app-header"></div>
    <main class="map-page">
      <h1 class="visually-hidden">Map</h1>
      <div id="map" class="map-page__canvas" aria-label="Map centered on Vancouver"></div>
    </main>
    <div class="app-bottom-dock">
      <section
        id="map-time-rail"
        class="map-time-rail"
        role="region"
        aria-label="Time of day"
      >
        <div class="map-time-rail__meta">
          <label class="map-time-rail__label" for="map-time-slider">Time of day</label>
          <output
            class="map-time-rail__value"
            id="map-time-rail-display"
            for="map-time-slider"
            aria-live="polite"
          >12:00</output>
        </div>
        <input
          type="range"
          class="form-range map-time-rail__range"
          id="map-time-slider"
          min="0"
          max="23"
          step="1"
          value="12"
          aria-valuemin="0"
          aria-valuemax="23"
          aria-valuenow="12"
          aria-valuetext="12:00"
        />
        <div class="map-time-rail__ticks" aria-hidden="true">
          <span>00:00</span>
          <span>06:00</span>
          <span>12:00</span>
          <span>18:00</span>
          <span>23:00</span>
        </div>
      </section>
      <div id="app-footer"></div>
    </div>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script>
      loadAppHeader({ showBack: false });
      loadAppFooter();
    </script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/pages/index.js"></script>
  </body>
</html>
