<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div id="app-header"></div>

        <div class="login-page">

        <div class="login-container">

            <div class="login-text-container">
                <h1>Login</h1>
            </div>

            <form class="login-form">

                <input type="text" id="loginUsernameID" placeholder="Username" required>
                <input type="password" id="loginPasswordID" placeholder="Password" required>
                <button type="button" id="loginButtonID">Login</button>
            </form>

            <div class="login-alt-text-container">
                <p>
                   Don't have an account?
                </p>
                <a href="/signup">Sign up</a>
            </div>

        </div>

        </div>

        <script src="js/components/header.js"></script>
        <script>
            loadAppHeader({ showBack: false });
        </script>
        <script src="js/pages/login.js"></script>
    </body>
</html>
