<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alerts — ShadeSafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="has-app-footer">
    <div id="app-header"></div>
    <main class="page-shell">
      <section class="alerts-page">
        <section class="alerts-shell">
          <header class="alerts-header">
            <h1 class="page-title">Alerts</h1>
            <p>Heat and UV alerts for your saved spots will show here.</p>
          </header>

          <section class="alerts-card alerts-risk-card"></section>

          <section class="alerts-card alerts-tips-card"></section>

          <section class="alerts-card alerts-last-card"></section>

          <aside class="alerts-note"></aside>

          <button class="alerts-check-btn" type="button">Refresh</button>
        </section>
      </section>
    </main>
    <div id="app-footer"></div>
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script>
      loadAppHeader({ showBack: false });
      loadAppFooter();
    </script>
    <script src="js/pages/alert.js"></script>
  </body>
</html>
